<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Webmail</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
    }

    .open-button {
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.25);
      transition: all 0.2s ease;
    }

    .open-button:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.35);
    }

    .open-button:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }
  </style>
</head>
<body>
  <button class="open-button" onclick="openPage()">Open Webmail</button>

  <script>
    function openPage() {
      window.open(
        "https://secure245.inmotionhosting.com:2096/",
        "_blank"
      );
    }
  </script>
</body>
</html>
